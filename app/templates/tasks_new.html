{{define "content"}}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          <i class="bi bi-clipboard2-plus me-2"></i>Create New Task
        </h4>
      </div>
      <div class="card-body">
        {{if .Error}}
        <div class="alert alert-danger d-flex gap-2 align-items-center">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{.Error}}</span>
        </div>
        {{end}}

        {{if not .Plans}}
        <div class="alert alert-warning d-flex gap-2 align-items-center">
          <i class="bi bi-info-circle-fill flex-shrink-0"></i>
          <span>
            You need a plan before adding a task.
            <a href="/plans/new" class="alert-link fw-semibold">Create a plan first</a>.
          </span>
        </div>
        {{end}}

        <form action="/tasks" method="POST">
          <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              <i class="bi bi-fonts me-1 text-muted"></i>Task Title
              <span class="text-danger ms-1">*</span>
            </label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="e.g. Submit lab assignment" required autofocus>
          </div>

          <div class="mb-3">
            <label for="plan_id" class="form-label fw-semibold">
              <i class="bi bi-folder2 me-1 text-muted"></i>Plan
              <span class="text-danger ms-1">*</span>
            </label>
            <select class="form-select" id="plan_id" name="plan_id" required
                    {{if not .Plans}}disabled{{end}}>
              <option value="">Select a plan...</option>
              {{range .Plans}}
              <option value="{{.ID}}">{{.Title}}</option>
              {{end}}
            </select>
            {{if not .Plans}}
            <div class="form-text text-warning">
              <i class="bi bi-exclamation-circle me-1"></i>
              No plans yet. <a href="/plans/new">Create one first</a>.
            </div>
            {{end}}
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label fw-semibold">
              <i class="bi bi-sticky me-1 text-muted"></i>Notes
              <span class="text-muted fw-normal ms-1">(optional)</span>
            </label>
            <textarea class="form-control" id="notes" name="notes" rows="3"
                      placeholder="Add any extra details..."></textarea>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label for="category" class="form-label fw-semibold">
                <i class="bi bi-tag me-1 text-muted"></i>Category
              </label>
              <select class="form-select" id="category" name="category">
                <option value="">None</option>
                <option value="School">🎓 School</option>
                <option value="Work">💼 Work</option>
                <option value="Personal">🏠 Personal</option>
                <option value="Other">📌 Other</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="status" class="form-label fw-semibold">
                <i class="bi bi-arrow-repeat me-1 text-muted"></i>Status
              </label>
              <select class="form-select" id="status" name="status">
                <option value="not_started">⬜ Not Started</option>
                <option value="in_progress">🔄 In Progress</option>
                <option value="completed">✅ Completed</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="due_date" class="form-label fw-semibold">
                <i class="bi bi-calendar3 me-1 text-muted"></i>Due Date
              </label>
              <input type="date" class="form-control" id="due_date" name="due_date">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" {{if not .Plans}}disabled{{end}}>
              <i class="bi bi-plus-lg me-1"></i>Create Task
            </button>
            <a href="/tasks" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
