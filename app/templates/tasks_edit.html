{{define "content"}}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="/tasks" class="text-white-50">
            <i class="bi bi-list-check me-1"></i>Tasks
          </a>
        </li>
        <li class="breadcrumb-item">
          <a href="/tasks/{{.Task.ID}}" class="text-white-50">{{.Task.Title}}</a>
        </li>
        <li class="breadcrumb-item active text-white">Edit</li>
      </ol>
    </nav>

    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          <i class="bi bi-pencil-square me-2"></i>Edit Task
        </h4>
      </div>
      <div class="card-body">
        {{if .Error}}
        <div class="alert alert-danger d-flex gap-2 align-items-center">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{.Error}}</span>
        </div>
        {{end}}

        <form action="/tasks/{{.Task.ID}}/edit" method="POST">
          <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              <i class="bi bi-fonts me-1 text-muted"></i>Task Title
              <span class="text-danger ms-1">*</span>
            </label>
            <input type="text" class="form-control" id="title" name="title"
                   value="{{.Task.Title}}" required autofocus>
          </div>

          <div class="mb-3">
            <label for="plan_id" class="form-label fw-semibold">
              <i class="bi bi-folder2 me-1 text-muted"></i>Plan
              <span class="text-danger ms-1">*</span>
            </label>
            <div class="input-group">
              <select class="form-select" id="plan_id" name="plan_id" required>
                <option value="">Select a plan...</option>
                {{range .Plans}}
                <option value="{{.ID}}" {{if eq .ID $.Task.PlanID}}selected{{end}}>{{.Title}}</option>
                {{end}}
              </select>
              <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#newPlanModal">
                <i class="bi bi-plus-lg"></i> New Plan
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label fw-semibold">
              <i class="bi bi-sticky me-1 text-muted"></i>Notes
              <span class="text-muted fw-normal ms-1">(optional)</span>
            </label>
            <textarea class="form-control" id="notes" name="notes" rows="3">{{.Task.Notes}}</textarea>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <label for="category" class="form-label fw-semibold">
                <i class="bi bi-tag me-1 text-muted"></i>Category
              </label>
              <select class="form-select" id="category" name="category">
                <option value="" {{if eq .Task.Category ""}}selected{{end}}>None</option>
                <option value="School" {{if eq .Task.Category "School"}}selected{{end}}>🎓 School</option>
                <option value="Work" {{if eq .Task.Category "Work"}}selected{{end}}>💼 Work</option>
                <option value="Personal" {{if eq .Task.Category "Personal"}}selected{{end}}>🏠 Personal</option>
                <option value="Other" {{if eq .Task.Category "Other"}}selected{{end}}>📌 Other</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="status" class="form-label fw-semibold">
                <i class="bi bi-arrow-repeat me-1 text-muted"></i>Status
              </label>
              <select class="form-select" id="status" name="status">
                <option value="not_started" {{if eq .Task.Status "not_started"}}selected{{end}}>⬜ Not Started</option>
                <option value="in_progress" {{if eq .Task.Status "in_progress"}}selected{{end}}>🔄 In Progress</option>
                <option value="completed" {{if eq .Task.Status "completed"}}selected{{end}}>✅ Completed</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="due_date" class="form-label fw-semibold">
                <i class="bi bi-calendar3 me-1 text-muted"></i>Due Date
              </label>
              <input type="date" class="form-control" id="due_date" name="due_date"
                     value="{{.Task.DueDate}}">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2 me-1"></i>Save Changes
            </button>
            <a href="/tasks/{{.Task.ID}}" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="newPlanModal" tabindex="-1" aria-labelledby="newPlanModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="newPlanModalLabel">
          <i class="bi bi-folder-plus me-2"></i>Create New Plan
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="planModalError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label for="newPlanTitle" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="newPlanTitle" placeholder="e.g. CS 408 Project" maxlength="200">
        </div>
        <div class="mb-3">
          <label for="newPlanDesc" class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
          <textarea class="form-control" id="newPlanDesc" rows="2" maxlength="1000"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="savePlanBtn">
          <i class="bi bi-plus-lg me-1"></i>Create Plan
        </button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/plan-modal.js"></script>
{{end}}
