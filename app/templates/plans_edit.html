{{define "content"}}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="/plans" class="text-white-50">
            <i class="bi bi-folder2 me-1"></i>Plans
          </a>
        </li>
        <li class="breadcrumb-item">
          <a href="/plans/{{.Plan.ID}}" class="text-white-50">{{.Plan.Title}}</a>
        </li>
        <li class="breadcrumb-item active text-white">Edit</li>
      </ol>
    </nav>

    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          <i class="bi bi-pencil-square me-2"></i>Edit Plan
        </h4>
      </div>

      <div class="card-body">
        {{if .Error}}
        <div class="alert alert-danger d-flex gap-2 align-items-center">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{.Error}}</span>
        </div>
        {{end}}

        <form action="/plans/{{.Plan.ID}}/edit" method="POST">
          <input type="hidden" name="_csrf" value="{{.CSRFToken}}">

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              <i class="bi bi-fonts me-1 text-muted"></i>Plan Title
              <span class="text-danger ms-1">*</span>
            </label>
            <input
              type="text"
              class="form-control"
              id="title"
              name="title"
              value="{{.Plan.Title}}"
              required
              autofocus
              maxlength="200"
            >
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">
              <i class="bi bi-text-paragraph me-1 text-muted"></i>Description
              <span class="text-muted fw-normal ms-1">(optional)</span>
            </label>
            <textarea
              class="form-control"
              id="description"
              name="description"
              rows="3"
              maxlength="1000"
            >{{.Plan.Description}}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2 me-1"></i>Save Changes
            </button>
            <a href="/plans" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
