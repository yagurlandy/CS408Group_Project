{{define "content"}}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          <i class="bi bi-folder2-open me-2"></i>Create New Plan
        </h4>
      </div>
      <div class="card-body">
        {{if .Error}}
        <div class="alert alert-danger d-flex gap-2 align-items-center">
          <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
          <span>{{.Error}}</span>
        </div>
        {{end}}
        <form action="/plans" method="POST">
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">
              <i class="bi bi-fonts me-1 text-muted"></i>Plan Title
              <span class="text-danger ms-1">*</span>
            </label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="e.g. CS 408 Project" required autofocus>
          </div>
          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">
              <i class="bi bi-text-paragraph me-1 text-muted"></i>Description
              <span class="text-muted fw-normal ms-1">(optional)</span>
            </label>
            <textarea class="form-control" id="description" name="description" rows="3"
                      placeholder="What is this plan about?"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-folder-plus me-1"></i>Create Plan
            </button>
            <a href="/plans" class="btn btn-outline-secondary">
              <i class="bi bi-x-lg me-1"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
